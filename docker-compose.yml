services:
  video-transcoder:
    # Build locally — or replace with a pre-built image from your registry:
    # image: ghcr.io/YOUR_GITHUB_USERNAME/video-transcoder:latest
    build: .
    container_name: video-transcoder
    restart: unless-stopped
    ports:
      - "8267:8267"
    volumes:
      - ./data:/data
      # Expose host /proc/net read-only so the app can read real NIC counters
      # without requiring network_mode: host (which conflicts with macvlan setups).
      - /proc/1/net:/host/proc/net:ro
      # Mount one or more media directories under /media — all subdirectories
      # are scanned automatically. Add as many mounts as needed.
      # - /path/to/movies:/media/movies
      # - /path/to/series:/media/series
    environment:
      - TZ=${TZ:-UTC}
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - SCHEDULE_HOUR=${SCHEDULE_HOUR:-3}
      - FFMPEG_CQ=${FFMPEG_CQ:-19}
      - FFMPEG_PRESET=${FFMPEG_PRESET:-fast}
      - DRY_RUN=${DRY_RUN:-false}
      - FFMPEG_WORKERS=${FFMPEG_WORKERS:-2}
      # Point to the host-mounted /proc/net/dev for real NIC counters.
      # Set NET_IFACE to pin a specific interface (comma-separated); without it
      # the code auto-detects physical interfaces, which works fine on most hosts.
      - PROC_NET_DEV=/host/proc/net/dev
      - NET_IFACE=${NET_IFACE:-eno1}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
